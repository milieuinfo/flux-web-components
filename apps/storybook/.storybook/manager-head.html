<html>
<body>
<style>
    button[data-version="replaced"] svg,
    button[data-version="v2-replace"] svg,
    button[data-version="v2-remove"] svg {
        color: red;
    }

    button[data-version="v2-todo"] svg,
    button[data-version="v3-impact"] svg {
        color: darkorange;
    }

    button[data-version="v3-next"] svg,
    button[data-version="next-folder"] svg {
        color: forestgreen;
    }
</style>
</body>
</html>
