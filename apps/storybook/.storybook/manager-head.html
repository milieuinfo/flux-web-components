<!--https://stackoverflow.com/questions/63313834/theme-the-storybook-sidebar-icons-->
<html>
<body>
<style>
    button[data-version="replaced"] svg,
    button[data-version="v1-replace"] svg,
    button[data-version="v1-remove"] svg {
        color: red;
    }

    button[data-version="v1-todo"] svg,
    button[data-version="v2-impact"] svg {
        color: darkorange;
    }

    button[data-version="v2-next"] svg,
    button[data-version="v2-next-style-base"] svg,
    button[data-version="v2-next-style-layout"] svg,
    button[data-version="v2-next-style-new"] svg {
        color: forestgreen;
    }
</style>
</body>
</html>
